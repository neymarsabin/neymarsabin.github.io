    - text: About Me
      url: /about/
    - text: My Projects
      url: /projects/
    - text: Cases
      url: /cases/
    - text: XML Feed
      url: /feed.xml

url: "https://neymarsabin.github.io"
baseurl: ""
paginate: 20
